<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ФОТОБАЗА</title>
    <link rel="icon" href="data:,">
</head>
<body>
<div class="grid-container">
    <header class="header">
        <div class="logo"><img src="fb.png" alt="Логотип"></div>
        <div class="header-search-sort">
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="Поиск папок, тегов, описаний" class="search-input">
                <button id="searchBtn" class="search-btn"><img src="lupa.png" alt="Поиск" width="18"></button>
            </div>
            <select id="sortSelect" class="sort-select">
                <option value="name_asc">По имени (А-Я)</option>
                <option value="name_desc">По имени (Я-А)</option>
                <option value="date_asc">Сначала старые</option>
                <option value="date_desc">Сначала новые</option>
            </select>
        </div>
        <div class="header-buttons">
            <button class="header-icon-btn" id="settingsBtn"><img src="setting.png" alt="Настройки" width="24"></button>
            <button class="header-icon-btn" id="databaseBtn"><img src="database.png" alt="База данных" width="24"></button>
            <button class="header-icon-btn" id="questionBtn"><img src="question.png" alt="Справка" width="24"></button>
        </div>
    </header>

    <div class="split-container">
        <div class="split-left">
            <div class="folders-header">
                <button class="create-folder-btn" id="createFolderBtn">➕ Создать папку</button>
            </div>
            <div class="folders-list-container">
                <ul class="folders-list" id="foldersList"></ul>
                <div id="emptyFolderMessage" class="empty-folders-msg">🗀 Папок пока нет<br>Нажмите «Создать папку»</div>
            </div>
        </div>
        <div class="split-right" id="rightPanel">
            <div class="right-panel-header">
                <div class="right-panel-title">Галерея</div>
                <div class="mode-switch">
                    <button class="mode-btn active" id="modeFolderBtn">По папкам</button>
                    <button class="mode-btn" id="modeAllBtn">Все фото</button>
                </div>
            </div>
            <div class="folder-content-area" id="folderContentView">
                <div class="placeholder-icon">🗀</div>
                <div class="folder-message">Выберите папку из списка слева</div>
            </div>
            <button class="add-photo-fab" id="addPhotoBtn" style="display: none;">➕ Добавить фото</button>
        </div>
    </div>

    <footer>
        <div class="footer-strip">
            <div class="footer-left-btns">
                <button class="square-btn" id="exportBtn"><img src="axport.png" alt="Экспорт"></button>
                <button class="square-btn" id="editBtn"><img src="pencils.png" alt="Редактировать"></button>
                <button class="square-btn" id="updateBtn"><img src="appdate.png" alt="Обновить"></button>
                <button class="square-btn" id="quickAddBtn"><img src="plus.png" alt="Быстрое добавление"></button>
            </div>
            <button class="square-btn footer-right-btn" id="deleteBtn"><img src="delete.png" alt="Корзина"></button>
        </div>
    </footer>
</div>

<div id="modalOverlay" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <span id="modalTitle">Заголовок</span>
            <button class="modal-close">&times;</button>
        </div>
        <div id="modalBody" class="modal-body"></div>
        <div class="modal-footer">
            <button id="modalConfirmBtn" class="modal-btn modal-confirm">OK</button>
            <button id="modalCancelBtn" class="modal-btn modal-cancel">Отмена</button>
        </div>
    </div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

  const supabaseUrl = 'https://meojfwicdormzamubexr.supabase.co'
  const supabaseKey = 'sb_publishable_azTxzoKa32Kq4mDP5EYmxQ_BZ2zot5w'
  const supabase = createClient(supabaseUrl, supabaseKey)
  const IMGBB_API_KEY = '7b8f4248b23e8ae808a7092532439bc0'

  let appData = { folders: {} }
  let currentFolder = null
  let currentMode = 'folder'
  let searchQuery = ''
  let currentSort = 'name_asc'
  let settings = { theme: 'light', thumbSize: 'medium' }
  const SETTINGS_KEY = 'photobase_settings_v3'

  // DOM elements
  const foldersListEl = document.getElementById('foldersList')
  const emptyMsgDiv = document.getElementById('emptyFolderMessage')
  const createBtn = document.getElementById('createFolderBtn')
  const folderContentView = document.getElementById('folderContentView')
  const addPhotoBtn = document.getElementById('addPhotoBtn')
  const modeFolderBtn = document.getElementById('modeFolderBtn')
  const modeAllBtn = document.getElementById('modeAllBtn')
  const searchInput = document.getElementById('searchInput')
  const searchBtn = document.getElementById('searchBtn')
  const sortSelect = document.getElementById('sortSelect')
  const settingsBtn = document.getElementById('settingsBtn')
  const databaseBtn = document.getElementById('databaseBtn')
  const questionBtn = document.getElementById('questionBtn')
  const exportBtn = document.getElementById('exportBtn')
  const editBtn = document.getElementById('editBtn')
  const updateBtn = document.getElementById('updateBtn')
  const quickAddBtn = document.getElementById('quickAddBtn')
  const deleteBtn = document.getElementById('deleteBtn')

  // Modal
  const modalOverlay = document.getElementById('modalOverlay')
  const modalTitle = document.getElementById('modalTitle')
  const modalBody = document.getElementById('modalBody')
  const modalConfirm = document.getElementById('modalConfirmBtn')
  const modalCancel = document.getElementById('modalCancelBtn')
  let modalResolve = null

  function showModal(title, html, showConfirm = true, showCancel = true) {
    return new Promise(resolve => {
      modalTitle.innerText = title
      modalBody.innerHTML = html
      modalConfirm.style.display = showConfirm ? 'inline-flex' : 'none'
      modalCancel.style.display = showCancel ? 'inline-flex' : 'none'
      modalOverlay.style.display = 'flex'
      modalResolve = resolve
    })
  }
  function closeModal(result) { modalOverlay.style.display = 'none'; if (modalResolve) modalResolve(result); modalResolve = null }
  modalConfirm.onclick = () => closeModal(true)
  modalCancel.onclick = () => closeModal(false)
  document.querySelector('.modal-close').onclick = () => closeModal(false)
  modalOverlay.onclick = (e) => { if (e.target === modalOverlay) closeModal(false) }

  function escapeHtml(str) { return String(str || '').replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])) }

  // Settings
  function loadSettings() {
    const stored = localStorage.getItem(SETTINGS_KEY)
    if (stored) try { settings = JSON.parse(stored) } catch(e) {}
    applyTheme()
    applyThumbSize()
  }
  function saveSettings() { localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)) }
  function applyTheme() {
    if (settings.theme === 'dark') document.body.classList.add('dark-theme')
    else document.body.classList.remove('dark-theme')
  }
  function applyThumbSize() {
    let sz = '140px'
    if (settings.thumbSize === 'small') sz = '100px'
    if (settings.thumbSize === 'large') sz = '200px'
    document.documentElement.style.setProperty('--thumb-size', sz)
  }

  // Image compression
  async function compressImage(file, maxWidth = 1200, quality = 0.7) {
    return new Promise((resolve, reject) => {
      if (!file.type.startsWith('image/') || file.size < 500 * 1024) {
        resolve(file)
        return
      }
      const img = new Image()
      img.onload = () => {
        let width = img.width, height = img.height
        if (width > maxWidth) {
          height = (height * maxWidth) / width
          width = maxWidth
        }
        const canvas = document.createElement('canvas')
        canvas.width = width
        canvas.height = height
        const ctx = canvas.getContext('2d')
        ctx.drawImage(img, 0, 0, width, height)
        canvas.toBlob(blob => {
          const compressed = new File([blob], file.name, { type: 'image/jpeg', lastModified: Date.now() })
          resolve(compressed)
        }, 'image/jpeg', quality)
      }
      img.onerror = () => reject(new Error('Ошибка загрузки изображения'))
      img.src = URL.createObjectURL(file)
    })
  }

  // Core functions
  async function loadFromSupabase() {
    try {
      const { data: folders, error: foldersError } = await supabase.from('folders').select('name, created_at')
      if (foldersError) throw foldersError
      const { data: photos, error: photosError } = await supabase.from('photos').select('*')
      if (photosError) throw photosError

      const newFolders = {}
      for (const f of folders) {
        newFolders[f.name] = {
          createdAt: f.created_at || Date.now(),
          photos: photos.filter(p => p.folder_name === f.name).map(p => ({
            id: p.id, url: p.image_url, tag: p.tag || '', desc: p.description || '', createdAt: p.created_at
          }))
        }
      }
      appData.folders = newFolders
      renderFolders()
      renderGallery()
    } catch (err) {
      console.error(err)
      alert('Не удалось загрузить данные')
    }
  }

  function addFolderToLocal(folderName) {
    if (appData.folders[folderName]) return false
    appData.folders[folderName] = { photos: [], createdAt: Date.now() }
    renderFolders()
    return true
  }

  function addPhotosToLocal(folderName, newPhotos) {
    if (!appData.folders[folderName]) appData.folders[folderName] = { photos: [] }
    appData.folders[folderName].photos.push(...newPhotos)
    if (currentFolder === folderName || currentMode === 'all') renderGallery()
    renderFolders()
  }

  function deleteFolderFromLocal(folderName) {
    delete appData.folders[folderName]
    if (currentFolder === folderName) currentFolder = null
    renderFolders()
    renderGallery()
  }

  function deletePhotoFromLocal(folderName, photoId) {
    const folder = appData.folders[folderName]
    if (!folder) return
    const idx = folder.photos.findIndex(p => p.id === photoId)
    if (idx !== -1) folder.photos.splice(idx, 1)
    renderFolders()
    renderGallery()
  }

  function renameFolderInLocal(oldName, newName) {
    if (oldName === newName) return true
    if (appData.folders[newName]) return false
    const folderData = appData.folders[oldName]
    if (!folderData) return false
    appData.folders[newName] = folderData
    delete appData.folders[oldName]
    for (const photo of folderData.photos) photo.folderName = newName
    if (currentFolder === oldName) currentFolder = newName
    renderFolders()
    renderGallery()
    return true
  }

  function updatePhotoInLocal(photoId, newTag, newDesc) {
    for (const folderName in appData.folders) {
      const photo = appData.folders[folderName].photos.find(p => p.id === photoId)
      if (photo) { photo.tag = newTag; photo.desc = newDesc; break }
    }
    renderGallery()
  }

  async function createFolderInSupabase(folderName) {
    const { error } = await supabase.from('folders').insert({ name: folderName })
    if (error) { alert('Ошибка создания папки: ' + error.message); return false }
    addFolderToLocal(folderName)
    currentFolder = folderName
    if (currentMode !== 'folder') setMode('folder')
    return true
  }

  async function addPhotoToSupabase(folderName, files, tag, desc) {
    const fileArray = Array.from(files)
    if (!fileArray.length) { alert('Выберите хотя бы одно изображение'); return }

    // Создаём модальный прогресс
    const progressDiv = document.createElement('div')
    progressDiv.className = 'loading-progress-modal'
    progressDiv.innerHTML = `
      <div style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); display:flex; align-items:center; justify-content:center; z-index:10001;">
        <div style="background:var(--bg-surface); border-radius:28px; padding:24px; width:280px; text-align:center;">
          <div style="font-size:32px; margin-bottom:12px;">📸</div>
          <div id="progressText" style="margin-bottom:10px; font-weight:500;">Подготовка...</div>
          <div style="background:#e2e8f0; border-radius:20px; height:8px; overflow:hidden;">
            <div id="progressBar" style="width:0%; height:100%; background:var(--accent); transition:width 0.2s;"></div>
          </div>
          <div id="progressDetail" style="margin-top:10px; font-size:12px; color:var(--text-secondary);"></div>
        </div>
      </div>
    `
    document.body.appendChild(progressDiv)
    const progressText = document.getElementById('progressText')
    const progressBar = document.getElementById('progressBar')
    const progressDetail = document.getElementById('progressDetail')

    try {
      // 1. Сжатие
      progressText.innerText = '🖼️ Сжатие изображений...'
      const compressed = []
      for (let i = 0; i < fileArray.length; i++) {
        const percent = (i / fileArray.length) * 100
        progressBar.style.width = `${percent}%`
        progressDetail.innerText = `Сжатие ${i+1}/${fileArray.length}`
        const comp = await compressImage(fileArray[i], 1200, 0.7)
        compressed.push(comp)
      }

      // 2. Загрузка ImgBB с прогрессом
      progressText.innerText = '☁️ Загрузка на ImgBB...'
      let uploaded = 0
      const uploadPromises = compressed.map(async (file) => {
        const fd = new FormData()
        fd.append('image', file)
        const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: fd })
        const data = await res.json()
        if (!data.success) throw new Error(data.error.message)
        uploaded++
        const percent = (uploaded / compressed.length) * 100
        progressBar.style.width = `${percent}%`
        progressDetail.innerText = `Загружено ${uploaded}/${compressed.length}`
        return data.data.url
      })
      const urls = await Promise.all(uploadPromises)

      // 3. Вставка в Supabase
      progressText.innerText = '💾 Сохранение в базу...'
      progressDetail.innerText = ''
      const records = urls.map(url => ({ folder_name: folderName, image_url: url, tag: tag || '', description: desc || '' }))
      const { data: inserted, error: dbErr } = await supabase.from('photos').insert(records).select()
      if (dbErr) throw dbErr

      const newPhotos = inserted.map(p => ({ id: p.id, url: p.image_url, tag: p.tag || '', desc: p.description || '', createdAt: p.created_at }))
      addPhotosToLocal(folderName, newPhotos)
    } catch (err) {
      console.error(err)
      alert(`Ошибка: ${err.message}`)
    } finally {
      progressDiv.remove()
    }
  }

  async function deleteFolderPermanently(folderName) {
    await supabase.from('photos').delete().eq('folder_name', folderName)
    await supabase.from('folders').delete().eq('name', folderName)
    deleteFolderFromLocal(folderName)
  }

  async function deletePhotoPermanently(folderName, photoId) {
    await supabase.from('photos').delete().eq('id', photoId)
    deletePhotoFromLocal(folderName, photoId)
  }

  async function renameFolderInSupabase(oldName, newName) {
    if (appData.folders[newName]) { alert('Папка с таким именем уже существует'); return false }
    const { error: updErr } = await supabase.from('folders').update({ name: newName }).eq('name', oldName)
    if (updErr) { alert('Ошибка переименования: ' + updErr.message); return false }
    await supabase.from('photos').update({ folder_name: newName }).eq('folder_name', oldName)
    renameFolderInLocal(oldName, newName)
    return true
  }

  async function updatePhotoMetadata(photoId, newTag, newDesc) {
    const { error } = await supabase.from('photos').update({ tag: newTag, description: newDesc }).eq('id', photoId)
    if (error) alert('Ошибка обновления: ' + error.message)
    else updatePhotoInLocal(photoId, newTag, newDesc)
  }

  // Render
  function getFilteredFolders() {
    let folders = Object.keys(appData.folders)
    if (searchQuery.trim()) {
      const q = searchQuery.toLowerCase()
      folders = folders.filter(f => f.toLowerCase().includes(q) || appData.folders[f].photos.some(p => p.tag.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q)))
    }
    switch (currentSort) {
      case 'name_asc': folders.sort((a,b)=>a.localeCompare(b)); break
      case 'name_desc': folders.sort((a,b)=>b.localeCompare(a)); break
      case 'date_asc': folders.sort((a,b)=>(appData.folders[a].createdAt||0)-(appData.folders[b].createdAt||0)); break
      case 'date_desc': folders.sort((a,b)=>(appData.folders[b].createdAt||0)-(appData.folders[a].createdAt||0)); break
    }
    return folders
  }

  function renderFolders() {
    const filtered = getFilteredFolders()
    foldersListEl.innerHTML = ''
    if (!filtered.length) { emptyMsgDiv.style.display = 'block'; foldersListEl.style.display = 'none'; if (currentFolder && !filtered.includes(currentFolder)) currentFolder = null; if (currentMode === 'folder') renderGallery(); return }
    emptyMsgDiv.style.display = 'none'
    foldersListEl.style.display = 'flex'
    filtered.forEach(f => {
      const li = document.createElement('li')
      li.className = 'folder-item'
      const span = document.createElement('span')
      span.className = 'folder-name'
      const cnt = appData.folders[f].photos.length
      span.innerHTML = `${escapeHtml(f)} <span class="folder-count">${cnt}</span>`
      span.onclick = () => { if (currentMode !== 'folder') setMode('folder'); currentFolder = f; renderGallery(); highlightActiveFolder(f) }
      const del = document.createElement('button')
      del.className = 'folder-delete'
      del.innerHTML = '✖'
      del.onclick = async (e) => { e.stopPropagation(); if (confirm(`Удалить папку «${f}»?`)) await deleteFolderPermanently(f) }
      li.appendChild(span); li.appendChild(del)
      foldersListEl.appendChild(li)
    })
    if (currentMode === 'folder' && currentFolder && filtered.includes(currentFolder)) highlightActiveFolder(currentFolder)
    else if (filtered.length && !currentFolder) { currentFolder = filtered[0]; renderGallery(); highlightActiveFolder(currentFolder) }
    else if (!filtered.length) currentFolder = null
    renderGallery()
  }

  function highlightActiveFolder(name) {
    document.querySelectorAll('.folder-item').forEach(item => {
      const span = item.querySelector('.folder-name')
      if (span && span.innerText.includes(name)) { item.style.background = 'var(--accent-glow)'; item.style.borderLeft = `3px solid var(--accent)` }
      else { item.style.background = ''; item.style.borderLeft = '' }
    })
  }

  function renderGallery() {
    if (currentMode === 'all') {
      addPhotoBtn.style.display = 'block'
      let allPhotos = []
      for (let f in appData.folders) appData.folders[f].photos.forEach(p => allPhotos.push({ ...p, folderName: f }))
      if (!allPhotos.length) { folderContentView.innerHTML = `<div class="folder-message">Нет фотографий</div>`; return }
      let html = `<div class="photos-grid">`
      allPhotos.forEach(ph => { html += `<div class="photo-card" data-folder="${escapeHtml(ph.folderName)}" data-id="${ph.id}"><img src="${ph.url}" class="photo-thumb" loading="lazy"><div class="photo-meta"><span class="photo-tag">🏷️ ${escapeHtml(ph.tag || 'без тега')}</span><span class="photo-desc">${escapeHtml(ph.desc || '')}</span></div><button class="photo-delete" data-id="${ph.id}">✖</button></div>` })
      html += `</div>`; folderContentView.innerHTML = html; attachPhotoEvents(); attachPhotoSelection(); return
    }
    if (!currentFolder || !appData.folders[currentFolder]) { folderContentView.innerHTML = `<div class="placeholder-icon">🗀</div><div class="folder-message">Выберите папку</div>`; addPhotoBtn.style.display = 'none'; return }
    addPhotoBtn.style.display = 'block'
    const folder = appData.folders[currentFolder]
    if (!folder.photos.length) { folderContentView.innerHTML = `<div class="folder-message"><strong>${escapeHtml(currentFolder)}</strong><br>Нет фотографий</div>`; return }
    let html = `<div class="photos-grid">`
    folder.photos.forEach(ph => { html += `<div class="photo-card" data-id="${ph.id}"><img src="${ph.url}" class="photo-thumb" loading="lazy"><div class="photo-meta"><span class="photo-tag">🏷️ ${escapeHtml(ph.tag || 'без тега')}</span><span class="photo-desc">${escapeHtml(ph.desc || '')}</span></div><button class="photo-delete" data-id="${ph.id}">✖</button></div>` })
    html += `</div>`; folderContentView.innerHTML = html; attachPhotoEvents(); attachPhotoSelection()
  }

  function attachPhotoEvents() {
    document.querySelectorAll('.photo-delete').forEach(btn => {
      btn.onclick = async (e) => {
        e.stopPropagation()
        const photoId = parseInt(btn.dataset.id)
        let folderName = currentFolder
        if (!folderName) folderName = btn.closest('.photo-card')?.dataset.folder
        if (!folderName) return
        if (confirm('Удалить фото?')) await deletePhotoPermanently(folderName, photoId)
      }
    })
  }

  function attachPhotoSelection() {
    document.querySelectorAll('.photo-card').forEach(card => {
      card.onclick = (e) => { if (e.target.classList.contains('photo-delete')) return; document.querySelectorAll('.photo-card').forEach(c => c.classList.remove('selected')); card.classList.add('selected') }
    })
  }

  // UI Actions
  async function editSelectedPhoto() {
    const selected = document.querySelector('.photo-card.selected')
    if (!selected) { alert('Кликните на фото'); return }
    const photoId = parseInt(selected.dataset.id)
    let photo
    if (currentMode === 'all') photo = appData.folders[selected.dataset.folder]?.photos.find(p => p.id === photoId)
    else photo = appData.folders[currentFolder]?.photos.find(p => p.id === photoId)
    if (!photo) return
    const html = `<input id="editTag" value="${escapeHtml(photo.tag)}" placeholder="Тег" style="width:100%; padding:10px"><textarea id="editDesc" rows="3" placeholder="Описание" style="margin-top:10px; width:100%; padding:10px">${escapeHtml(photo.desc)}</textarea>`
    const ok = await showModal('Редактировать фото', html, true, true)
    if (ok) await updatePhotoMetadata(photoId, document.getElementById('editTag').value.trim(), document.getElementById('editDesc').value.trim())
  }

  async function renameFolder() {
    if (!currentFolder) { alert('Выберите папку'); return }
    const html = `<input id="newName" value="${escapeHtml(currentFolder)}" style="width:100%; padding:10px">`
    const ok = await showModal('Переименовать папку', html, true, true)
    if (ok) { const newName = document.getElementById('newName').value.trim(); if (newName && newName !== currentFolder) await renameFolderInSupabase(currentFolder, newName); else if (!newName) alert('Имя не может быть пустым') }
  }

  async function showAddPhotoDialog(targetFolder) {
    const html = `<input type="file" id="photoFiles" accept="image/*" multiple><input id="photoTag" placeholder="Тег" style="margin-top:10px; width:100%; padding:8px"><textarea id="photoDesc" rows="2" placeholder="Описание" style="margin-top:10px; width:100%; padding:8px"></textarea><small>Можно выбрать несколько фото</small>`
    const ok = await showModal(`Добавить фото в «${escapeHtml(targetFolder)}»`, html, true, true)
    if (!ok) return
    const files = document.getElementById('photoFiles').files
    if (!files.length) { alert('Выберите фото'); return }
    const tag = document.getElementById('photoTag').value.trim()
    const desc = document.getElementById('photoDesc').value.trim()
    await addPhotoToSupabase(targetFolder, files, tag, desc)
  }

  async function quickAdd() {
    if (currentMode === 'folder' && currentFolder) await showAddPhotoDialog(currentFolder)
    else if (currentMode === 'all') {
      const list = Object.keys(appData.folders)
      if (!list.length) { alert('Создайте папку'); return }
      const html = `<select id="folderSelect" style="width:100%; padding:10px">${list.map(f => `<option>${escapeHtml(f)}</option>`).join('')}</select>`
      const ok = await showModal('Выберите папку', html, true, true)
      if (ok) await showAddPhotoDialog(document.getElementById('folderSelect').value)
    } else alert('Выберите папку')
  }

  function exportData() {
    let data
    if (currentMode === 'folder' && currentFolder) data = { folder: currentFolder, data: appData.folders[currentFolder] }
    else if (currentMode === 'all') { const all = []; for (let f in appData.folders) appData.folders[f].photos.forEach(p => all.push({ folder: f, ...p })); data = all }
    else { alert('Выберите папку'); return }
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' })
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = currentMode === 'folder' ? `${currentFolder}.json` : 'all_photos.json'; a.click(); URL.revokeObjectURL(a.href)
  }

  async function showSettingsDialog() {
    const html = `<div style="display:flex; justify-content:space-between; align-items:center;"><span>🌙 Тёмная тема</span><label class="switch"><input type="checkbox" id="themeCheckbox" ${settings.theme === 'dark' ? 'checked' : ''}><span class="slider"></span></label></div><div style="margin-top:20px;"><div>Размер миниатюр</div><div style="display:flex; gap:12px; margin-top:8px;"><button class="size-opt ${settings.thumbSize === 'small' ? 'active' : ''}" data-size="small">Маленькие</button><button class="size-opt ${settings.thumbSize === 'medium' ? 'active' : ''}" data-size="medium">Средние</button><button class="size-opt ${settings.thumbSize === 'large' ? 'active' : ''}" data-size="large">Большие</button></div></div><style>.switch{position:relative; display:inline-block; width:50px; height:24px;}.switch input{opacity:0;}.slider{position:absolute; cursor:pointer; inset:0; background:#ccc; border-radius:34px;}.slider:before{position:absolute; content:""; height:18px; width:18px; left:3px; bottom:3px; background:white; border-radius:50%; transition:0.2s;}input:checked+.slider{background:var(--accent);}input:checked+.slider:before{transform:translateX(26px);}.size-opt{padding:6px 14px; border-radius:40px; background:var(--accent-soft); cursor:pointer; border:none;}.size-opt.active{background:var(--accent); color:white;}</style>`
    const ok = await showModal('Настройки', html, true, true)
    if (ok) {
      settings.theme = document.getElementById('themeCheckbox').checked ? 'dark' : 'light'
      const active = document.querySelector('.size-opt.active')
      if (active) settings.thumbSize = active.dataset.size
      saveSettings(); applyTheme(); applyThumbSize(); renderGallery()
    }
  }

  function showDatabase() {
    let rows = ''
    for (let fn in appData.folders) {
      rows += `<tr style="background:var(--accent-soft);"><td colspan="4"><strong>📁 ${escapeHtml(fn)}</strong> (${appData.folders[fn].photos.length})</td></tr>`
      appData.folders[fn].photos.forEach((p, i) => { rows += `<tr><td>${i+1}</td><td><img src="${p.url}" width="40" height="40" style="border-radius:8px; object-fit:cover"></td><td>${escapeHtml(p.tag)}</td><td>${escapeHtml(p.desc)}</td></tr>` })
    }
    showModal('База данных', `<table style="width:100%; border-collapse:collapse;"><thead><tr><th>#</th><th>Фото</th><th>Тег</th><th>Описание</th></tr></thead><tbody>${rows}</tbody></table>`, false, true)
  }

  function showHelp() { showModal('Справка', '✅ Функционал: папки, фото + теги/описание, поиск, сортировка, сжатие, прогресс. Фото через ImgBB, метаданные в Supabase.', false, true) }
  function demoUpdate() { loadFromSupabase() }

  function setMode(mode) {
    currentMode = mode
    mode === 'folder' ? (modeFolderBtn.classList.add('active'), modeAllBtn.classList.remove('active')) : (modeAllBtn.classList.add('active'), modeFolderBtn.classList.remove('active'))
    renderGallery(); renderFolders()
  }

  function performSearch() { searchQuery = searchInput.value; renderFolders(); renderGallery() }

  // Event listeners
  createBtn.onclick = async () => { const html = `<input id="folderName" placeholder="Название папки" style="width:100%; padding:10px">`; const ok = await showModal('Создать папку', html, true, true); if (ok) { const name = document.getElementById('folderName').value.trim(); if (name && !appData.folders[name]) await createFolderInSupabase(name); else alert('Некорректное имя или уже существует') } }
  addPhotoBtn.onclick = () => { if (currentFolder) showAddPhotoDialog(currentFolder); else alert('Выберите папку') }
  modeFolderBtn.onclick = () => setMode('folder')
  modeAllBtn.onclick = () => setMode('all')
  searchBtn.onclick = performSearch
  searchInput.onkeyup = (e) => { if (e.key === 'Enter') performSearch() }
  sortSelect.onchange = (e) => { currentSort = e.target.value; renderFolders(); renderGallery() }
  settingsBtn.onclick = showSettingsDialog
  databaseBtn.onclick = showDatabase
  questionBtn.onclick = showHelp
  exportBtn.onclick = exportData
  editBtn.onclick = renameFolder
  updateBtn.onclick = demoUpdate
  quickAddBtn.onclick = quickAdd
  deleteBtn.onclick = () => alert('Удаление происходит с подтверждением.')

  // Initialize
  loadSettings()
  await loadFromSupabase()
  if (!Object.keys(appData.folders).length) currentFolder = null
  else if (!currentFolder) currentFolder = Object.keys(appData.folders)[0]
  renderFolders()
  renderGallery()
  if (currentFolder) highlightActiveFolder(currentFolder)
</script>
</body>
</html>
